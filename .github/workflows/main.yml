name: Compilar CORTAUDIO Portable

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Descargar proyecto
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependencias
        run: npm install

      - name: Crear EXE portable
        run: npm run dist

      - name: Publicar ejecutable
        uses: actions/upload-artifact@v4
        with:
          name: CORTAUDIO-Portable-Windows
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
